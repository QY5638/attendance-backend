spring:
  datasource:
    url: jdbc:mysql://<db-host>:<db-port>/<db-name>?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: <db-username>
    password: <db-password>
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: <redis-host>
    port: <redis-port>
    password: <redis-password>
    database: 0
    timeout: 3000ms

app:
  face:
    provider: compreface
    compreface-base-url: http://127.0.0.1:8000
    compreface-api-key: <compreface-recognition-api-key>
    compreface-subject-prefix: attendance-user-
    match-score-threshold: 85.00
    require-liveness: true
    liveness-session-ttl-seconds: 180
    liveness-proof-ttl-seconds: 180
    liveness-action-count: 3
    liveness-min-duration-ms: 3000
    liveness-max-duration-ms: 45000
    liveness-min-sample-count: 12
    liveness-blink-score-threshold: 0.65
    liveness-mouth-open-score-threshold: 0.65
    liveness-turn-score-threshold: 0.70
    metadata-secret: <face-metadata-secret>
  llm:
    provider: <llm-provider>
    base-url: <llm-base-url>
    model: <llm-model>
    api-key: <llm-api-key>
    timeout-ms: 10000
  map:
    provider: <map-provider>
    base-url: <map-base-url>
    api-key: <map-api-key>
    timeout-ms: 3000
    multi-location-window-minutes: 30
    multi-location-distance-meters: 3000
