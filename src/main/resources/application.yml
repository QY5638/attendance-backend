spring:
  application:
    name: attendance-backend
  profiles:
    active: dev
  jackson:
    default-property-inclusion: non_null

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

logging:
  charset:
    console: UTF-8
    file: UTF-8
  level:
    root: info
    com.quyong.attendance: debug

app:
  notification:
    stream-timeout-ms: 600000
    default-reply-timeout-hours: 24
    reminder-cooldown-minutes: 240
    reminder-fixed-delay-ms: 300000
  attendance:
    absence-check-fixed-delay-ms: 3600000
