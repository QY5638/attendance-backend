spring:
  application:
    name: attendance-backend
  profiles:
    active: dev
  jackson:
    default-property-inclusion: non_null
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

logging:
  charset:
    console: UTF-8
    file: UTF-8
  level:
    root: info
    com.quyong.attendance: debug
