spring:
  application:
    name: attendance-backend
  profiles:
    active: dev
  config:
    import: optional:file:./application-local.yml
  jackson:
    default-property-inclusion: non_null

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

logging:
  charset:
    console: UTF-8
    file: UTF-8
  level:
    root: info
    com.quyong.attendance: debug
