spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/system?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
    hikari:
      initialization-fail-timeout: 0
      connection-timeout: 3000
      validation-timeout: 1000
  redis:
    host: localhost
    port: 6379
    database: 0
    timeout: 3000ms

app:
  env: prod
