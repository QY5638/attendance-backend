name: 后端 CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  backend-ci:
    name: Maven 全量测试与编译
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      - name: 运行后端全量测试集
        run: mvn test

      - name: 运行编译校验
        run: mvn -DskipTests compile
